<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> </title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    html, body { height: 100%; }
    body { display: flex; align-items: stretch; justify-content: center; padding: 12px 12px 0; }
    .win7-window { width: 100%; max-width: 1200px; display: flex; flex-direction: column; height: calc(100vh - 12px); }
    .win7-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .toolbar-label { font-size: 11px; color: #555; margin-right: 4px; cursor: default; }
    .toolbar-sep { width: 1px; background: #c0c0c0; height: 20px; margin: 0 4px; }

    .main-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 1fr auto;
      flex: 1;
      overflow: hidden;
    }

    .left-col {
      background: #f8f8f8;
      border-right: 1px solid #c8c8c8;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      grid-row: 1 / 3;
    }

    .calc-result-num {
      font-size: 36px;
      font-weight: 300;
      color: #1a4080;
      line-height: 1;
      margin: 6px 0 2px;
      font-family: 'Segoe UI Light', 'Segoe UI', sans-serif;
    }
    .calc-result-unit { font-size: 11px; color: #888; margin-bottom: 10px; }
    .calc-result-rows { border-top: 1px solid #e0e0e0; padding-top: 8px; }
    .calc-result-row {
      display: flex; justify-content: space-between;
      padding: 3px 0; font-size: 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #1e1e1e;
    }
    .calc-result-row:last-child { border-bottom: none; }
    .calc-result-key { color: #666; }
    .err-msg { font-size: 11px; color: #cc0000; min-height: 14px; margin-top: 4px; }

    .refresh-track {
      background: linear-gradient(to bottom, #d0d0d0, #e8e8e8);
      border: 1px solid #abadb3;
      height: 10px;
      border-radius: 1px;
      padding: 1px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
      margin-top: 8px;
      overflow: hidden;
    }
    .refresh-fill {
      height: 100%;
      background: linear-gradient(to bottom, #b8e060 0%, #76c030 40%, #50a818 60%, #76c030 100%);
      min-width: 3px;
      transition: width 1s linear;
    }
    .refresh-txt { font-size: 10px; color: #888; text-align: right; margin-top: 2px; }

    .wl-add { display: flex; gap: 6px; margin-bottom: 8px; }
    .wl-add input { margin: 0; text-transform: uppercase; font-weight: 600; }
    .wl-list { border: 1px solid #d0d0d0; background: #fff; }
    .wl-item { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }
    .wl-item:last-child { border-bottom: none; }
    .wl-item:hover { background: #cde8ff; }
    .wl-ticker { font-size: 13px; font-weight: 600; color: #1a3a6a; cursor: pointer; letter-spacing: 0.3px; }
    .wl-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.15s; }
    .wl-del:hover { color: #cc0000; }
    .wl-empty { font-size: 12px; color: #aaa; padding: 8px; }

    .right-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      grid-row: 1;
    }
    .scanner-toolbar {
      background: linear-gradient(to bottom, #f8f8f8, #ebebeb);
      border-bottom: 1px solid #c8c8c8;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .scanner-label { font-size: 12px; color: #1e4d8c; font-weight: 600; margin-right: 8px; }
    .scan-meta-txt { font-size: 11px; color: #888; }
    .filter-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .filter-wrap input { width: 160px; margin: 0; }
    .count-txt { font-size: 11px; color: #888; white-space: nowrap; }
    .scan-table-wrap { flex: 1; overflow: auto; }

    .chart-row {
      grid-column: 2;
      grid-row: 2;
      border-top: 2px solid #4a90d9;
      background: #fff;
      display: none;
      flex-direction: column;
    }
    .chart-row.visible { display: flex; }
    .chart-toolbar {
      background: linear-gradient(to bottom, #f8f8f8, #ebebeb);
      border-bottom: 1px solid #c8c8c8;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .chart-ticker-name {
      font-size: 13px;
      font-weight: 700;
      color: #1a3a6a;
      letter-spacing: 0.5px;
      margin-right: 8px;
    }
    .chart-interval-btn {
      background: linear-gradient(to bottom, #f0f0f0, #e0e0e0);
      border: 1px solid #abadb3;
      border-radius: 2px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      font-family: 'Segoe UI', sans-serif;
      transition: all 0.1s;
    }
    .chart-interval-btn:hover { background: linear-gradient(to bottom, #e0f0ff, #c8e4ff); border-color: #7eb4ea; }
    .chart-interval-btn.active { background: linear-gradient(to bottom, #aed4f8, #8ec0f0); border-color: #4a90d9; color: #1a3a6a; }
    .chart-close {
      margin-left: auto;
      background: linear-gradient(to bottom, #f0f0f0, #e0e0e0);
      border: 1px solid #abadb3;
      border-radius: 2px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
      font-family: 'Segoe UI', sans-serif;
    }
    .chart-close:hover { background: linear-gradient(to bottom, #ffe0e0, #ffc8c8); border-color: #e07070; color: #cc0000; }
    .chart-container { flex: 1; min-height: 360px; }

    .win7-listview { width: 100%; border-collapse: collapse; font-size: 12px; }
    .win7-listview th {
      background: linear-gradient(to bottom, #f8f8f8, #e8e8e8);
      border-right: 1px solid #d0d0d0;
      border-bottom: 2px solid #c0c0c0;
      padding: 5px 10px;
      text-align: left;
      font-weight: 600;
      color: #1e1e1e;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .win7-listview th:hover { background: linear-gradient(to bottom, #e8f0ff, #d8e8ff); }
    .win7-listview td { padding: 4px 10px; border-bottom: 1px solid #ececec; color: #1e1e1e; vertical-align: middle; }
    .win7-listview tr:hover td { background: #cde8ff; }
    .win7-listview tr:nth-child(even) td { background: #f7f7f7; }
    .win7-listview tr:nth-child(even):hover td { background: #cde8ff; }
    .ticker-link { color: #1a3a6a; font-weight: 700; cursor: pointer; text-decoration: none; }
    .ticker-link:hover { text-decoration: underline; color: #0050a0; }
    .today-badge { background: #0060c0; color: #fff; font-size: 9px; padding: 1px 5px; margin-left: 5px; border-radius: 2px; font-weight: 600; text-transform: uppercase; }
    .scan-empty { color: #888; text-align: center; padding: 40px; font-size: 12px; }
    .scan-action { background: linear-gradient(to bottom, #f0f0f0, #e0e0e0); border: 1px solid #abadb3; border-radius: 2px; padding: 2px 8px; font-size: 11px; color: #1e1e1e; cursor: pointer; margin-right: 3px; font-family: 'Segoe UI', sans-serif; }
    .scan-action:hover { background: linear-gradient(to bottom, #e0f0ff, #c8e4ff); border-color: #7eb4ea; }

    .win7-statusbar {
      background: linear-gradient(to bottom, #e8e8e8, #d8d8d8);
      border-top: 1px solid #c0c0c0;
      padding: 3px 10px;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #444;
      flex-shrink: 0;
    }
    .status-pane { padding: 0 10px; border-right: 1px solid #c0c0c0; white-space: nowrap; }
    .status-pane:first-child { padding-left: 0; }
    .status-pane:last-child { border-right: none; margin-left: auto; }

    .win7-taskbar {
      background: linear-gradient(to bottom, rgba(20,40,80,0.92) 0%, rgba(15,30,65,0.96) 100%);
      border-top: 1px solid rgba(80,120,200,0.5);
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      box-shadow: 0 -1px 0 rgba(255,255,255,0.1);
    }
    .win7-start {
      background: radial-gradient(ellipse at center, #3a8fd8 0%, #1a5fae 50%, #0e3d8a 100%);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px;
      box-shadow: 0 0 8px rgba(80,150,255,0.6);
      flex-shrink: 0;
    }
    .win7-taskbar-app { background: linear-gradient(to bottom, rgba(80,120,200,0.3), rgba(40,80,160,0.2)); border: 1px solid rgba(100,150,220,0.4); border-radius: 2px; padding: 4px 10px; font-size: 11px; color: rgba(255,255,255,0.9); cursor: pointer; font-family: 'Segoe UI', sans-serif; white-space: nowrap; }
    .win7-clock { margin-left: auto; text-align: center; font-size: 11px; color: rgba(255,255,255,0.9); padding: 2px 8px; font-family: 'Segoe UI', sans-serif; line-height: 1.4; }
    .win7-next-scan { font-size: 10px; color: rgba(255,255,255,0.55); padding: 0 10px; white-space: nowrap; }
    .win7-status { font-size: 11px; color: rgba(255,255,255,0.65); padding: 0 10px; border-left: 1px solid rgba(255,255,255,0.15); white-space: nowrap; }

    @media (max-width: 800px) {
      .main-layout { grid-template-columns: 1fr; grid-template-rows: auto; }
      .left-col { grid-row: auto; border-right: none; border-bottom: 1px solid #c8c8c8; }
      .chart-row { grid-column: 1; }
    }
  </style>
</head>
<body>
  <div class="win7-window">
    <div class="win7-titlebar">
      <span class="win7-title"> </span>
      <div class="win7-controls">
        <div class="win7-ctrl win7-ctrl-min">&#x2212;</div>
        <div class="win7-ctrl win7-ctrl-max">&#x25A1;</div>
        <div class="win7-ctrl win7-ctrl-close" onclick="logout()">&#x2715;</div>
      </div>
    </div>

    <div class="win7-body">

      <div class="win7-toolbar">
        <span class="toolbar-label">File</span>
        <span class="toolbar-label">View</span>
        <span class="toolbar-label">Tools</span>
        <div class="toolbar-sep"></div>
        <button class="win7-btn" id="scan-btn" onclick="triggerScan()">▶ Run Scanner</button>
        <button class="win7-btn" onclick="logout()">Sign out</button>
      </div>

      <div class="win7-progress-wrap" id="progress-wrap" style="display:none">
        <div class="win7-progress-label" id="progress-label">Downloading market data...</div>
        <div class="win7-progress-track">
          <div class="win7-progress-dots" id="progress-dots"></div>
          <div class="win7-progress-fill" id="progress-fill" style="width:2%"></div>
        </div>
        <div class="win7-progress-sub">
          <span id="progress-count"></span>
          <span id="progress-updated"></span>
        </div>
      </div>

      <div class="main-layout">

        <div class="left-col">
          <div class="win7-panel">
            <div class="win7-panel-label">Position Size Calculator</div>
            <label>Account Value ($)</label>
            <input type="number" id="account" placeholder="100000" oninput="saveAccount()" />
            <label>Ticker</label>
            <input type="text" id="calc-ticker" placeholder="AAPL" maxlength="6"
              oninput="this.value=this.value.toUpperCase()"
              onkeydown="if(event.key==='Enter') startCalc()" />
            <div style="display:flex;gap:6px;margin-bottom:6px">
              <button class="win7-btn-primary" onclick="startCalc()">Calculate</button>
              <button class="win7-btn" onclick="clearCalc()">Clear</button>
            </div>
            <p class="err-msg" id="calc-error"></p>
            <div id="calc-result" style="display:none">
              <div class="calc-result-num" id="pos-size">—</div>
              <div class="calc-result-unit">shares</div>
              <div class="refresh-track">
                <div class="refresh-fill" id="refresh-fill" style="width:100%"></div>
              </div>
              <div class="refresh-txt" id="refresh-label">30s</div>
              <div class="calc-result-rows">
                <div class="calc-result-row"><span class="calc-result-key">Ticker</span><span id="res-ticker">—</span></div>
                <div class="calc-result-row"><span class="calc-result-key">Price</span><span id="res-price">—</span></div>
                <div class="calc-result-row"><span class="calc-result-key">Day Low</span><span id="res-low">—</span></div>
                <div class="calc-result-row"><span class="calc-result-key">Risk/share</span><span id="res-risk">—</span></div>
                <div class="calc-result-row"><span class="calc-result-key">1% risk</span><span id="res-dollar-risk">—</span></div>
              </div>
            </div>
          </div>

          <div class="win7-panel" style="flex:1">
            <div class="win7-panel-label">Watchlist</div>
            <div class="wl-add">
              <input type="text" id="new-ticker" placeholder="AAPL" maxlength="6"
                style="text-transform:uppercase"
                onkeydown="if(event.key==='Enter') addTicker()" />
              <button class="win7-btn" onclick="addTicker()">Add</button>
            </div>
            <div class="wl-list" id="wl-list">
              <div class="wl-empty">Loading...</div>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div class="scanner-toolbar">
            <span class="scanner-label">Scanner Results</span>
            <span class="scan-meta-txt" id="scan-meta"></span>
            <div class="filter-wrap">
              <label style="margin:0;color:#555">Filter:</label>
              <input type="text" id="filter" placeholder="Ticker..." oninput="renderTable()" />
              <span class="count-txt" id="count"></span>
            </div>
          </div>
          <div class="scan-table-wrap">
            <table class="win7-listview">
              <thead>
                <tr>
                  <th onclick="sortBy('ticker')">Ticker</th>
                  <th onclick="sortBy('setup_date')">Setup Date</th>
                  <th onclick="sortBy('scanned_at')">Scanned At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="scan-body">
                <tr><td colspan="4" class="scan-empty">Loading scanner results...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="chart-row" id="chart-row">
          <div class="chart-toolbar">
            <span class="chart-ticker-name" id="chart-ticker-name">—</span>
            <button class="chart-close" onclick="closeChart()">✕ Close chart</button>
          </div>
          <div class="chart-container" id="chart-container"></div>
        </div>

      </div>

      <div class="win7-statusbar">
        <span class="status-pane" id="status-main">Ready</span>
        <span class="status-pane">NASDAQ + NYSE</span>
        <span class="status-pane" id="next-scan">Next scan: calculating...</span>
        <span class="status-pane" id="status-time"></span>
      </div>

    </div>
  </div>

  <div style="position:fixed;bottom:0;left:0;right:0">
    <div class="win7-taskbar">
      <div class="win7-start">⊞</div>
      <div class="win7-taskbar-app"> </div>
      <span class="win7-next-scan" id="taskbar-next"></span>
      <span class="win7-status" id="taskbar-status">Ready</span>
      <div class="win7-clock" id="clock"></div>
    </div>
  </div>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    fetch('/api/me').then(r => { if (!r.ok) window.location.href = '/' })
    async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/' }

    function tick() {
      const now = new Date()
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      const date = now.toLocaleDateString()
      document.getElementById('clock').innerHTML = `${time}<br>${date}`
      document.getElementById('status-time').textContent = time + ' · ' + date
    }
    tick(); setInterval(tick, 1000)

    function updateNextScan() {
      const now = new Date()
      const utc = now.getTime() + now.getTimezoneOffset() * 60000
      const nowPT = new Date(utc + (-7 * 60 * 60000))
      let next = new Date(nowPT)
      next.setHours(15, 0, 0, 0)
      if (nowPT >= next) next.setDate(next.getDate() + 1)
      while (next.getDay() === 0 || next.getDay() === 6) next.setDate(next.getDate() + 1)
      const diffMs = next - nowPT
      const h = Math.floor(diffMs / 3600000)
      const m = Math.floor((diffMs % 3600000) / 60000)
      const s = Math.floor((diffMs % 60000) / 1000)
      const ct = h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`
      const day = next.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
      const txt = `Next scan: ${day} 3:00 PM PDT (in ${ct})`
      document.getElementById('next-scan').textContent = txt
      document.getElementById('taskbar-next').textContent = txt
    }
    updateNextScan(); setInterval(updateNextScan, 1000)

    const accountInput = document.getElementById('account')
    accountInput.value = localStorage.getItem('st_account') || ''
    function saveAccount() { localStorage.setItem('st_account', accountInput.value) }

    let calcTicker = '', calcTimer = null, calcCountdown = 30, countdownTimer = null

    function clearCalc() {
      document.getElementById('calc-ticker').value = ''
      document.getElementById('calc-result').style.display = 'none'
      document.getElementById('calc-error').textContent = ''
      clearInterval(calcTimer); clearInterval(countdownTimer)
    }

    function startCalc(ticker) {
      const t = ticker || document.getElementById('calc-ticker').value.trim().toUpperCase()
      if (!t) return
      document.getElementById('calc-ticker').value = t
      calcTicker = t
      clearInterval(calcTimer); clearInterval(countdownTimer)
      fetchCalc()
      calcTimer = setInterval(fetchCalc, 30000)
    }

    async function fetchCalc() {
      const account = parseFloat(document.getElementById('account').value)
      const errEl = document.getElementById('calc-error')
      errEl.textContent = ''
      if (!account) { errEl.textContent = 'Please enter your account value.'; return }
      errEl.textContent = 'Fetching data...'
      document.getElementById('status-main').textContent = `Fetching ${calcTicker}...`
      document.getElementById('taskbar-status').textContent = `Fetching ${calcTicker}...`

      const res = await fetch(`/api/stocks/${calcTicker}`)
      if (!res.ok) {
        const d = await res.json().catch(() => ({}))
        errEl.textContent = d.error || `Ticker not found: ${calcTicker}`
        document.getElementById('calc-result').style.display = 'none'
        document.getElementById('status-main').textContent = 'Error'
        document.getElementById('taskbar-status').textContent = 'Error'
        return
      }

      const s = await res.json()
      errEl.textContent = ''
      document.getElementById('status-main').textContent = 'Ready'
      document.getElementById('taskbar-status').textContent = 'Ready'

      const price = s.price, low = s.low
      const riskPerShare = price - low
      const dollarRisk = account * 0.01
      const positionSize = riskPerShare > 0 ? Math.floor(dollarRisk / riskPerShare) : 0

      document.getElementById('calc-result').style.display = 'block'
      document.getElementById('res-ticker').textContent = calcTicker
      document.getElementById('pos-size').textContent = positionSize.toLocaleString()
      document.getElementById('res-price').textContent = '$' + price.toFixed(2)
      document.getElementById('res-low').textContent = '$' + low.toFixed(2)
      document.getElementById('res-risk').textContent = riskPerShare > 0 ? '$' + riskPerShare.toFixed(2) : 'N/A'
      document.getElementById('res-dollar-risk').textContent = '$' + dollarRisk.toFixed(2)

      calcCountdown = 30
      clearInterval(countdownTimer)
      countdownTimer = setInterval(() => {
        calcCountdown--
        document.getElementById('refresh-fill').style.width = Math.max(calcCountdown / 30 * 100, 2) + '%'
        document.getElementById('refresh-label').textContent = 'Refreshing in ' + calcCountdown + 's'
        if (calcCountdown <= 0) clearInterval(countdownTimer)
      }, 1000)
    }

    // ── Chart ──
    let currentChartTicker = ''
    let currentInterval = 'D'
    let tvWidget = null

    function loadChart(ticker, interval) {
      interval = interval || currentInterval
      currentChartTicker = ticker
      currentInterval = interval

      document.getElementById('chart-ticker-name').textContent = ticker
      document.getElementById('chart-row').classList.add('visible')

      const container = document.getElementById('chart-container')
      container.innerHTML = '<div id="tv_chart_div" style="height:360px"></div>'

      if (window.TradingView) {
        tvWidget = new TradingView.widget({
          container_id: 'tv_chart_div',
          width: '100%',
          height: 360,
          symbol: ticker,
          interval: interval,
          timezone: 'America/New_York',
          theme: 'light',
          style: '1',
          locale: 'en',
          toolbar_bg: '#f8f8f8',
          enable_publishing: false,
          allow_symbol_change: true,
          hide_side_toolbar: false,
          save_image: false,
        })
      }
    }

    function closeChart() {
      document.getElementById('chart-row').classList.remove('visible')
      document.getElementById('chart-container').innerHTML = ''
      tvWidget = null
      currentChartTicker = ''
    }

    // ── Watchlist ──
    let watchlist = []

    function renderList() {
      const el = document.getElementById('wl-list')
      if (!watchlist.length) { el.innerHTML = '<div class="wl-empty">No tickers added yet.</div>'; return }
      const sorted = [...watchlist].sort((a, b) => a.ticker.localeCompare(b.ticker))
      el.innerHTML = sorted.map(item => `
        <div class="wl-item">
          <span class="wl-ticker" onclick="startCalc('${item.ticker}'); loadChart('${item.ticker}')">${item.ticker}</span>
          <button class="wl-del" onclick="removeTicker('${item.id}')">×</button>
        </div>
      `).join('')
    }

    async function loadWatchlist() {
      const r = await fetch('/api/watchlist')
      if (!r.ok) return
      watchlist = await r.json()
      renderList()
    }

    async function addTicker() {
      const ticker = document.getElementById('new-ticker').value.trim().toUpperCase()
      if (!ticker) return
      const r = await fetch('/api/watchlist', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker })
      })
      if (r.ok) { document.getElementById('new-ticker').value = ''; loadWatchlist() }
    }

    async function removeTicker(id) {
      await fetch(`/api/watchlist/${id}`, { method: 'DELETE' })
      watchlist = watchlist.filter(w => w.id !== id)
      renderList()
    }

    // ── Scanner ──
    let results = [], sortCol = 'setup_date', sortDir = -1

    function sortBy(col) {
      sortCol === col ? sortDir *= -1 : (sortCol = col, sortDir = -1)
      renderTable()
    }

    function renderTable() {
      const filter = document.getElementById('filter').value.trim().toUpperCase()
      const today = new Date().toISOString().slice(0, 10)
      let rows = results.filter(r => !filter || r.ticker.includes(filter))
      rows.sort((a, b) => { const av = a[sortCol]||'', bv = b[sortCol]||''; return av < bv ? -sortDir : av > bv ? sortDir : 0 })
      document.getElementById('count').textContent = rows.length + ' item' + (rows.length !== 1 ? 's' : '')
      if (!rows.length) {
        document.getElementById('scan-body').innerHTML = '<tr><td colspan="4" class="scan-empty">No scanner results. Scanner runs at 3:00 PM PDT on weekdays.</td></tr>'
        return
      }
      document.getElementById('scan-body').innerHTML = rows.map(r => {
        const isToday = r.setup_date === today
        return `<tr>
          <td>
            <span class="ticker-link" onclick="loadChart('${r.ticker}'); startCalc('${r.ticker}')">${r.ticker}</span>
            ${isToday ? '<span class="today-badge">new</span>' : ''}
          </td>
          <td>${r.setup_date}</td>
          <td style="color:#666;font-size:11px">${new Date(r.scanned_at).toLocaleString()}</td>
          <td>
            <button class="scan-action" onclick="addToWatchlist('${r.ticker}')">+ Watchlist</button>
            <button class="scan-action" onclick="startCalc('${r.ticker}')">Calculate</button>
            <button class="scan-action" onclick="loadChart('${r.ticker}')">📈 Chart</button>
          </td>
        </tr>`
      }).join('')
    }

    async function addToWatchlist(ticker) {
      const r = await fetch('/api/watchlist', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker })
      })
      if (r.ok) {
        loadWatchlist()
        document.getElementById('status-main').textContent = ticker + ' added to watchlist'
        document.getElementById('taskbar-status').textContent = ticker + ' added'
      }
    }

    async function loadScanner() {
      const r = await fetch('/api/scanner')
      if (!r.ok) return
      results = await r.json()
      document.getElementById('scan-meta').textContent = results.length > 0
        ? 'Last scan: ' + new Date(results[0].scanned_at).toLocaleString()
        : 'No scans run yet'
      renderTable()
    }

    let wasActive = false

    async function loadProgress() {
      const r = await fetch('/api/scanner-progress')
      if (!r.ok) return
      const p = await r.json()
      const wrap = document.getElementById('progress-wrap')
      const active = p.status !== 'idle'
      wrap.style.display = active ? 'block' : 'none'

      if (active) {
        wasActive = true
        const pct = p.tickers_total > 0 ? Math.round(p.tickers_done / p.tickers_total * 100) : 0
        const labels = { running: 'Starting scanner...', downloading: 'Downloading market data...', scanning: 'Scanning for setups...', saving: 'Saving results to database...' }
        document.getElementById('progress-label').textContent = labels[p.status] || p.status

        const dots = document.getElementById('progress-dots')
        const fill = document.getElementById('progress-fill')
        if (p.tickers_total > 0) {
          dots.style.display = 'none'
          fill.style.display = 'block'
          fill.style.width = Math.max(pct, 2) + '%'
        } else {
          dots.style.display = 'block'
          fill.style.display = 'none'
        }

        document.getElementById('progress-count').textContent = p.tickers_total > 0
          ? `${p.tickers_done.toLocaleString()} of ${p.tickers_total.toLocaleString()} tickers (${pct}%)`
          : 'Initializing...'
        document.getElementById('progress-updated').textContent = p.updated_at
          ? 'Updated ' + new Date(p.updated_at).toLocaleTimeString()
          : ''
        document.getElementById('status-main').textContent = labels[p.status] || p.status
        document.getElementById('taskbar-status').textContent = p.tickers_total > 0 ? `${pct}% complete` : 'Starting...'
      } else if (wasActive) {
        wasActive = false
        document.getElementById('status-main').textContent = 'Scan complete — loading results...'
        document.getElementById('taskbar-status').textContent = 'Scan complete'
        await loadScanner()
        document.getElementById('status-main').textContent = 'Ready'
        document.getElementById('taskbar-status').textContent = 'Ready'
      }
    }

    async function triggerScan() {
      const btn = document.getElementById('scan-btn')
      btn.disabled = true; btn.textContent = 'Starting...'
      document.getElementById('status-main').textContent = 'Triggering scanner...'
      const r = await fetch('/api/trigger-scan', { method: 'POST' })
      const data = await r.json()
      if (data.ok) {
        btn.textContent = 'Running...'
        document.getElementById('status-main').textContent = 'Scanner started'
        setTimeout(() => { btn.disabled = false; btn.textContent = '▶ Run Scanner' }, 600000)
      } else {
        btn.disabled = false; btn.textContent = '▶ Run Scanner'
        document.getElementById('status-main').textContent = 'Error: ' + (data.error || 'Could not start scanner')
      }
    }

    async function init() {
      await loadProgress()
      loadWatchlist()
      loadScanner()
      setInterval(loadProgress, 3000)
      setInterval(loadScanner, 300000)
    }

    init()
  </script>
</body>
</html>
