<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwingTrader — Scanner</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    .scan-meta { font-size: 12px; color: #333; margin-bottom: 20px; }
    .scan-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; border-bottom: 1px solid #1a1a1a; }
    td { padding: 12px 16px; border-bottom: 1px solid #141414; font-size: 13px; color: #ccc; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #131313; }
    .ticker-cell { font-size: 14px; font-weight: 600; color: #fff; }
    .num { font-variant-numeric: tabular-nums; }
    .empty { color: #2a2a2a; text-align: center; padding: 60px; }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/dashboard">📈 SwingTrader</a>
    <a class="nav-link active" href="/dashboard">Scanner</a>
    <a class="nav-link" href="/watchlist">Watchlist</a>
    <div class="nav-right"><button class="logout-btn" onclick="logout()">Sign out</button></div>
  </nav>
  <main>
    <h1>Scanner Results</h1>
    <p class="scan-meta" id="scan-meta">Loading...</p>
    <div class="scan-card">
      <table>
        <thead id="scan-head"><tr><th>Waiting for scan results...</th></tr></thead>
        <tbody id="scan-body"><tr><td class="empty">No scans run yet. Results will appear here after the scanner runs.</td></tr></tbody>
      </table>
    </div>
  </main>
  <script>
    fetch('/api/me').then(r => { if (!r.ok) window.location.href = '/' })
    async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/' }
    // Scanner results will be loaded here once Python code is integrated
  </script>
</body>
</html>
