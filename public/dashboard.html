<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwingTrader</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    body { padding: 4px; min-height: 100vh; display: flex; flex-direction: column; }
    .main-window { flex: 1; }
    .main-layout { display: grid; grid-template-columns: 210px 1fr; gap: 6px; }
    .result-box { border: 2px solid; border-color: #808080 #fff #fff #808080; background: #fff; padding: 6px; margin-top: 6px; }
    .result-num { font-size: 26px; font-weight: bold; color: #000080; font-family: 'Courier New', monospace; }
    .result-row { display: flex; justify-content: space-between; border-bottom: 1px solid #d0d0d0; padding: 2px 0; font-size: 11px; }
    .result-row:last-child { border-bottom: none; }
    .refresh-track { background: #808080; height: 4px; margin-top: 4px; }
    .refresh-fill { background: #000080; height: 4px; transition: width 1s linear; }
    .refresh-txt { font-size: 10px; color: #808080; text-align: right; margin-top: 1px; }
    .wl-list { border: 2px solid; border-color: #808080 #fff #fff #808080; background: #fff; }
    .wl-item { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px; border-bottom: 1px solid #e0e0e0; }
    .wl-item:last-child { border-bottom: none; }
    .wl-item:hover { background: #000080; color: #fff; }
    .wl-ticker { font-weight: bold; cursor: pointer; color: #000080; font-size: 11px; }
    .wl-item:hover .wl-ticker { color: #fff; }
    .del { background: none; border: none; cursor: pointer; font-size: 11px; color: #808080; padding: 0 2px; }
    .del:hover { color: red; }
    .wl-empty { padding: 4px; color: #808080; font-size: 11px; }
    .scan-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .scan-table th { background: #000080; color: #fff; padding: 2px 6px; text-align: left; border-right: 1px solid #000060; cursor: pointer; white-space: nowrap; }
    .scan-table td { padding: 2px 6px; border-bottom: 1px solid #e0e0e0; background: #fff; white-space: nowrap; }
    .scan-table tr:hover td { background: #000080; color: #fff; }
    .today-badge { background: #ff0000; color: #fff; font-size: 9px; padding: 0 3px; margin-left: 4px; font-weight: bold; }
    .action-btn { background: #c0c0c0; border: 1px solid; border-color: #fff #808080 #808080 #fff; padding: 1px 5px; font-size: 10px; font-family: 'MS Sans Serif', Arial, sans-serif; cursor: pointer; margin-right: 2px; color: #000; }
    .action-btn:active { border-color: #808080 #fff #fff #808080; }
    .scan-empty { color: #808080; padding: 20px; text-align: center; }
    .err-msg { color: red; font-size: 11px; min-height: 14px; margin-top: 2px; }
    .progress-bar-wrap { margin-bottom: 4px; }
    .p-track { background: #808080; height: 16px; border: 2px solid; border-color: #808080 #fff #fff #808080; position: relative; }
    .p-fill { background: #000080; height: 100%; transition: width 0.5s; }
    .p-text { position: absolute; top: 0; left: 0; right: 0; text-align: center; color: #fff; font-size: 10px; line-height: 16px; mix-blend-mode: difference; }
    .filter-row { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; }
    .filter-row input { margin: 0; width: 140px; }
  </style>
</head>
<body>
  <div class="window main-window">
    <div class="titlebar">
      <span>SwingTrader</span>
      <div class="titlebar-btns">
        <div class="tb-btn">_</div>
        <div class="tb-btn">□</div>
        <div class="tb-btn" onclick="logout()">✕</div>
      </div>
    </div>

    <div class="win-body">
      <div class="main-layout">

        <!-- LEFT -->
        <div>
          <!-- Calculator -->
          <div class="panel">
            <div class="panel-label">Position Size Calculator</div>
            <label>Account Value ($)</label>
            <input type="number" id="account" placeholder="100000" oninput="saveAccount()" />
            <label>Ticker</label>
            <input type="text" id="calc-ticker" placeholder="AAPL" maxlength="6"
              oninput="this.value=this.value.toUpperCase()"
              onkeydown="if(event.key==='Enter') startCalc()" />
            <div style="display:flex;gap:4px">
              <button class="win-btn" onclick="startCalc()">Calculate</button>
              <button class="win-btn" onclick="clearCalc()">Clear</button>
            </div>
            <p class="err-msg" id="calc-error"></p>
            <div class="result-box" id="calc-result" style="display:none">
              <div style="font-size:10px;color:#808080">POSITION SIZE</div>
              <div class="result-num" id="pos-size">—</div>
              <div style="font-size:10px;color:#808080;margin-bottom:4px">shares</div>
              <div class="result-row"><span>Ticker</span><span id="res-ticker">—</span></div>
              <div class="result-row"><span>Price</span><span id="res-price">—</span></div>
              <div class="result-row"><span>Day Low</span><span id="res-low">—</span></div>
              <div class="result-row"><span>Risk/share</span><span id="res-risk">—</span></div>
              <div class="result-row"><span>1% risk</span><span id="res-dollar-risk">—</span></div>
              <div class="refresh-track"><div class="refresh-fill" id="refresh-fill" style="width:100%"></div></div>
              <div class="refresh-txt" id="refresh-label">30s</div>
            </div>
          </div>

          <!-- Watchlist -->
          <div class="panel">
            <div class="panel-label">Watchlist</div>
            <div style="display:flex;gap:4px;margin-bottom:4px">
              <input type="text" id="new-ticker" placeholder="AAPL" maxlength="6" style="margin:0;flex:1;text-transform:uppercase"
                onkeydown="if(event.key==='Enter') addTicker()" />
              <button class="win-btn" onclick="addTicker()">Add</button>
            </div>
            <div class="wl-list" id="wl-list">
              <div class="wl-empty">Loading...</div>
            </div>
          </div>
        </div>

        <!-- RIGHT: Scanner -->
        <div>
          <!-- Progress bar -->
          <div id="progress-wrap" style="display:none" class="panel progress-bar-wrap">
            <div class="panel-label" id="progress-label">Scanner running...</div>
            <div class="p-track">
              <div class="p-fill" id="progress-fill" style="width:0%"></div>
              <div class="p-text" id="progress-count"></div>
            </div>
            <div style="font-size:10px;color:#808080;margin-top:2px" id="progress-updated"></div>
          </div>

          <div class="panel">
            <div class="panel-label">
              Scanner Results &nbsp;
              <span class="muted" id="scan-meta"></span>
            </div>
            <div class="filter-row">
              <label style="display:inline;margin:0">Filter:</label>
              <input type="text" id="filter" placeholder="Ticker..." oninput="renderTable()" />
              <span class="muted" id="count"></span>
            </div>
            <div class="sunken" style="overflow:auto;max-height:420px">
              <table class="scan-table">
                <thead>
                  <tr>
                    <th onclick="sortBy('ticker')">Ticker</th>
                    <th onclick="sortBy('setup_date')">Setup Date</th>
                    <th onclick="sortBy('scanned_at')">Scanned At</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="scan-body">
                  <tr><td colspan="4" class="scan-empty">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="statusbar">
      <div class="status-panel" id="status-main">Ready</div>
      <div class="status-panel">NASDAQ + NYSE</div>
      <div class="status-panel" id="next-scan">Next scan: calculating...</div>
      <div class="status-panel" id="status-time"></div>
    </div>
  </div>

  <div class="taskbar">
    <button class="win-btn" style="font-weight:bold">▶ Start</button>
    <button class="win-btn">📈 SwingTrader</button>
    <div style="margin-left:auto;border:2px solid;border-color:#808080 #fff #fff #808080;padding:2px 8px;font-size:11px;background:#c0c0c0" id="clock"></div>
  </div>

  <script>
    fetch('/api/me').then(r => { if (!r.ok) window.location.href = '/' })
    async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/' }

    function tick() {
      const now = new Date()
      document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      document.getElementById('status-time').textContent = now.toLocaleDateString()
    }
    tick(); setInterval(tick, 1000)

    function updateNextScan() {
      const now = new Date()
      const utc = now.getTime() + now.getTimezoneOffset() * 60000
      const pdtOffset = -7 * 60 * 60000
      const nowPT = new Date(utc + pdtOffset)
      let next = new Date(nowPT)
      next.setHours(15, 0, 0, 0)
      if (nowPT >= next) next.setDate(next.getDate() + 1)
      while (next.getDay() === 0 || next.getDay() === 6) next.setDate(next.getDate() + 1)
      const diffMs = next - nowPT
      const h = Math.floor(diffMs / 3600000)
      const m = Math.floor((diffMs % 3600000) / 60000)
      const s = Math.floor((diffMs % 60000) / 1000)
      const ct = h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`
      const day = next.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
      document.getElementById('next-scan').textContent = `Next scan: ${day} 3:00 PM PST (in ${ct})`
    }
    updateNextScan()
    setInterval(updateNextScan, 1000)

    const accountInput = document.getElementById('account')
    accountInput.value = localStorage.getItem('st_account') || ''
    function saveAccount() { localStorage.setItem('st_account', accountInput.value) }

    let calcTicker = '', calcTimer = null, calcCountdown = 30, countdownTimer = null

    function clearCalc() {
      document.getElementById('calc-ticker').value = ''
      document.getElementById('calc-result').style.display = 'none'
      document.getElementById('calc-error').textContent = ''
      clearInterval(calcTimer)
      clearInterval(countdownTimer)
    }

    function startCalc(ticker) {
      const t = ticker || document.getElementById('calc-ticker').value.trim().toUpperCase()
      if (!t) return
      document.getElementById('calc-ticker').value = t
      calcTicker = t
      clearInterval(calcTimer)
      clearInterval(countdownTimer)
      fetchCalc()
      calcTimer = setInterval(fetchCalc, 30000)
    }

    async function fetchCalc() {
      const account = parseFloat(document.getElementById('account').value)
      const errEl = document.getElementById('calc-error')
      errEl.textContent = ''
      if (!account) { errEl.textContent = 'Enter account value first'; return }
      errEl.textContent = 'Fetching...'
      document.getElementById('status-main').textContent = `Fetching ${calcTicker}...`

      const res = await fetch(`/api/stocks/${calcTicker}`)
      if (!res.ok) {
        const d = await res.json().catch(() => ({}))
        errEl.textContent = d.error || `Not found: ${calcTicker}`
        document.getElementById('calc-result').style.display = 'none'
        document.getElementById('status-main').textContent = 'Error'
        return
      }

      const s = await res.json()
      errEl.textContent = ''
      document.getElementById('status-main').textContent = 'Ready'

      const price = s.price, low = s.low
      const riskPerShare = price - low
      const dollarRisk = account * 0.01
      const positionSize = riskPerShare > 0 ? Math.floor(dollarRisk / riskPerShare) : 0

      document.getElementById('calc-result').style.display = 'block'
      document.getElementById('res-ticker').textContent = calcTicker
      document.getElementById('pos-size').textContent = positionSize.toLocaleString()
      document.getElementById('res-price').textContent = '$' + price.toFixed(2)
      document.getElementById('res-low').textContent = '$' + low.toFixed(2)
      document.getElementById('res-risk').textContent = riskPerShare > 0 ? '$' + riskPerShare.toFixed(2) : 'N/A'
      document.getElementById('res-dollar-risk').textContent = '$' + dollarRisk.toFixed(2)

      calcCountdown = 30
      clearInterval(countdownTimer)
      countdownTimer = setInterval(() => {
        calcCountdown--
        document.getElementById('refresh-fill').style.width = (calcCountdown / 30 * 100) + '%'
        document.getElementById('refresh-label').textContent = 'Refresh in ' + calcCountdown + 's'
        if (calcCountdown <= 0) clearInterval(countdownTimer)
      }, 1000)
    }

    let watchlist = []

    function renderList() {
      const el = document.getElementById('wl-list')
      if (!watchlist.length) { el.innerHTML = '<div class="wl-empty">No tickers.</div>'; return }
      el.innerHTML = watchlist.map(item => `
        <div class="wl-item">
          <span class="wl-ticker" onclick="startCalc('${item.ticker}')">${item.ticker}</span>
          <button class="del" onclick="removeTicker('${item.id}')">✕</button>
        </div>
      `).join('')
    }

    async function loadWatchlist() {
      const r = await fetch('/api/watchlist')
      if (!r.ok) return
      watchlist = await r.json()
      renderList()
    }

    async function addTicker() {
      const ticker = document.getElementById('new-ticker').value.trim().toUpperCase()
      if (!ticker) return
      const r = await fetch('/api/watchlist', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker })
      })
      if (r.ok) { document.getElementById('new-ticker').value = ''; loadWatchlist() }
    }

    async function removeTicker(id) {
      await fetch(`/api/watchlist/${id}`, { method: 'DELETE' })
      watchlist = watchlist.filter(w => w.id !== id)
      renderList()
    }

    let results = [], sortCol = 'setup_date', sortDir = -1

    function sortBy(col) {
      sortCol === col ? sortDir *= -1 : (sortCol = col, sortDir = -1)
      renderTable()
    }

    function renderTable() {
      const filter = document.getElementById('filter').value.trim().toUpperCase()
      const today = new Date().toISOString().slice(0, 10)
      let rows = results.filter(r => !filter || r.ticker.includes(filter))
      rows.sort((a, b) => { const av = a[sortCol]||'', bv = b[sortCol]||''; return av < bv ? -sortDir : av > bv ? sortDir : 0 })
      document.getElementById('count').textContent = rows.length + ' result' + (rows.length !== 1 ? 's' : '')
      if (!rows.length) {
        document.getElementById('scan-body').innerHTML = '<tr><td colspan="4" class="scan-empty">No results. Scanner runs at 3:00 PM PST weekdays.</td></tr>'
        return
      }
      document.getElementById('scan-body').innerHTML = rows.map(r => {
        const isToday = r.setup_date === today
        return `<tr>
          <td><b>${r.ticker}</b>${isToday ? '<span class="today-badge">NEW</span>' : ''}</td>
          <td>${r.setup_date}</td>
          <td>${new Date(r.scanned_at).toLocaleString()}</td>
          <td>
            <button class="action-btn" onclick="addToWatchlist('${r.ticker}')">+Watch</button>
            <button class="action-btn" onclick="startCalc('${r.ticker}')">Calc</button>
          </td>
        </tr>`
      }).join('')
    }

    async function addToWatchlist(ticker) {
      const r = await fetch('/api/watchlist', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker })
      })
      if (r.ok) { loadWatchlist(); document.getElementById('status-main').textContent = ticker + ' added to watchlist' }
    }

    async function loadScanner() {
      const r = await fetch('/api/scanner')
      if (!r.ok) return
      results = await r.json()
      document.getElementById('scan-meta').textContent = results.length > 0
        ? 'Last scan: ' + new Date(results[0].scanned_at).toLocaleString()
        : 'No scans yet'
      renderTable()
    }

    let wasActive = false

    async function loadProgress() {
      const r = await fetch('/api/scanner-progress')
      if (!r.ok) return
      const p = await r.json()
      const wrap = document.getElementById('progress-wrap')
      const active = p.status !== 'idle'
      wrap.style.display = active ? 'block' : 'none'

      if (active) {
        wasActive = true
        const pct = p.tickers_total > 0 ? Math.round(p.tickers_done / p.tickers_total * 100) : 0
        const labels = {
          running: 'Starting scanner...',
          downloading: 'Downloading market data...',
          scanning: 'Scanning for setups...',
          saving: 'Saving results...'
        }
        document.getElementById('progress-label').textContent = labels[p.status] || p.status
        document.getElementById('progress-fill').style.width = pct + '%'
        document.getElementById('progress-count').textContent = p.tickers_total > 0
          ? `${p.tickers_done.toLocaleString()} / ${p.tickers_total.toLocaleString()} (${pct}%)`
          : 'Starting...'
        document.getElementById('progress-updated').textContent = p.updated_at
          ? 'Updated ' + new Date(p.updated_at).toLocaleTimeString()
          : ''
      } else if (wasActive) {
        wasActive = false
        document.getElementById('status-main').textContent = 'Scan complete — loading results...'
        await loadScanner()
        document.getElementById('status-main').textContent = 'Ready'
      }
    }

    async function init() {
      await loadProgress()
      loadWatchlist()
      loadScanner()
      setInterval(loadProgress, 3000)
      setInterval(loadScanner, 300000)
    }

    init()
  </script>
</body>
</html>
