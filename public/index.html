<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwingTrader</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 320px; }
    h1 { font-size: 32px; font-weight: 100; color: #fff; margin-bottom: 32px; letter-spacing: -0.5px; }
    .err { font-size: 12px; color: #ff6b6b; margin-top: 12px; min-height: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-row { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <h1>SwingTrader</h1>
    <label>Username</label>
    <input type="text" id="username" autocomplete="username" />
    <label>Password</label>
    <input type="password" id="password" autocomplete="current-password" />
    <div class="btn-row">
      <button class="metro-btn-solid" id="btn" onclick="login()">Sign in</button>
    </div>
    <p class="err" id="error"></p>
  </div>
  <script>
    fetch('/api/me').then(r => { if (r.ok) window.location.href = '/dashboard' })
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus() })
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login() })
    async function login() {
      const btn = document.getElementById('btn')
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value
      if (!username || !password) return
      btn.disabled = true; btn.textContent = '...'
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
      const data = await res.json()
      if (data.ok) { window.location.href = '/dashboard' }
      else { document.getElementById('error').textContent = 'Invalid credentials'; btn.disabled = false; btn.textContent = 'Sign in'; document.getElementById('password').value = '' }
    }
  </script>
</body>
</html>
