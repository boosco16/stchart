<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stchart</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 280px; }
    .field { margin-bottom: 8px; }
    .err { color: red; font-size: 11px; margin-top: 4px; min-height: 14px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="window">
      <div class="titlebar">
        <span>SwingTrader Login</span>
        <div class="titlebar-btns"><div class="tb-btn">✕</div></div>
      </div>
      <div class="win-body">
        <div class="panel">
          <div class="field">
            <label>Username:</label>
            <input type="text" id="username" autocomplete="username" />
          </div>
          <div class="field">
            <label>Password:</label>
            <input type="password" id="password" autocomplete="current-password" />
          </div>
          <div style="display:flex;justify-content:flex-end;gap:4px;margin-top:6px">
            <button class="win-btn" id="btn" onclick="login()">OK</button>
            <button class="win-btn" onclick="document.getElementById('username').value='';document.getElementById('password').value=''">Cancel</button>
          </div>
          <p class="err" id="error"></p>
        </div>
      </div>
    </div>
  </div>
  <script>
    fetch('/api/me').then(r => { if (r.ok) window.location.href = '/dashboard' })
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus() })
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login() })
    async function login() {
      const btn = document.getElementById('btn')
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value
      if (!username || !password) return
      btn.disabled = true; btn.textContent = '...'
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
      const data = await res.json()
      if (data.ok) { window.location.href = '/dashboard' }
      else { document.getElementById('error').textContent = 'Invalid username or password'; btn.disabled = false; btn.textContent = 'OK'; document.getElementById('password').value = '' }
    }
  </script>
</body>
</html>
