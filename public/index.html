<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .wrap { width: 280px; display: flex; flex-direction: column; gap: 10px; }
    input { width: 100%; background: #141414; border: 1px solid #222; border-radius: 8px; padding: 11px 14px; color: #e5e5e5; font-size: 14px; outline: none; }
    input:focus { border-color: #00c97a; }
    input::placeholder { color: #333; }
    button { width: 100%; padding: 11px; border-radius: 8px; background: #00c97a; color: #000; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .error { font-size: 12px; color: #ff5555; text-align: center; min-height: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <input id="username" type="text" placeholder="Username" autocomplete="username" />
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="btn" onclick="login()">Sign in</button>
    <p class="error" id="error"></p>
  </div>
  <script>
    fetch('/api/me').then(r => { if (r.ok) window.location.href = '/dashboard' })
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus() })
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login() })
    async function login() {
      const btn = document.getElementById('btn')
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value
      if (!username || !password) return
      btn.disabled = true; btn.textContent = '...'
      const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
      const data = await res.json()
      if (data.ok) { window.location.href = '/dashboard' }
      else { document.getElementById('error').textContent = 'Invalid credentials'; btn.disabled = false; btn.textContent = 'Sign in'; document.getElementById('password').value = '' }
    }
  </script>
</body>
</html>
