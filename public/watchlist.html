<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwingTrader — Watchlist</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    .add-bar { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; }
    .add-bar .field { display: flex; flex-direction: column; }
    .add-bar input { width: 120px; }
    .add-bar input.ticker { width: 90px; text-transform: uppercase; font-weight: 600; }
    .wl-wrap { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 12px 16px; text-align: left; border-bottom: 1px solid #1a1a1a;
      white-space: nowrap;
    }
    td { padding: 13px 16px; border-bottom: 1px solid #141414; font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #131313; }
    .ticker-cell { font-size: 15px; font-weight: 600; color: #fff; }
    .name-cell { font-size: 12px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .price-cell { font-variant-numeric: tabular-nums; font-size: 14px; color: #ccc; }
    .num { font-variant-numeric: tabular-nums; }
    .buzz-pill { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; white-space: nowrap; }
    .buzz-hot { background: #2d1200; color: #f5a623; }
    .buzz-mid { background: #1e1a00; color: #d4a800; }
    .buzz-low { background: #161616; color: #444; }
    .del-btn { background: none; border: none; color: #2a2a2a; cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: color 0.15s; }
    .del-btn:hover { color: #ff5555; }
    .empty-row td { color: #333; text-align: center; padding: 48px; }
    .edit-input { background: #161616; border: 1px solid #00c97a; border-radius: 6px; padding: 4px 8px; color: #fff; font-size: 13px; width: 80px; }
    .save-btn { background: #001f12; border: 1px solid #00c97a; border-radius: 6px; padding: 3px 8px; color: #00c97a; font-size: 12px; cursor: pointer; }
    .vol-bar { width: 60px; height: 4px; background: #1a1a1a; border-radius: 2px; margin-top: 4px; }
    .vol-fill { height: 4px; border-radius: 2px; transition: width 0.3s; }
    .refresh-note { font-size: 11px; color: #333; text-align: right; margin-top: 10px; }
    @media (max-width: 700px) {
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/dashboard">📈 SwingTrader</a>
    <a class="nav-link" href="/dashboard">Dashboard</a>
    <a class="nav-link active" href="/watchlist">Watchlist</a>
    <a class="nav-link" href="/calculator">Calculator</a>
    <div class="nav-right">
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <main>
    <h1>Watchlist</h1>

    <div class="add-bar">
      <div class="field">
        <label>Ticker</label>
        <input class="ticker" id="new-ticker" type="text" placeholder="AAPL" maxlength="6" />
      </div>
      <div class="field">
        <label>Avg Cost (optional)</label>
        <input id="new-cost" type="number" step="0.01" placeholder="e.g. 182.50" />
      </div>
      <div class="field">
        <label>Shares (optional)</label>
        <input id="new-shares" type="number" step="0.01" placeholder="e.g. 100" />
      </div>
      <div class="field">
        <label>Notes</label>
        <input id="new-notes" type="text" placeholder="optional" style="width:160px" />
      </div>
      <button class="btn btn-green" onclick="addTicker()">+ Add</button>
    </div>

    <div class="wl-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Price</th>
            <th>Change</th>
            <th>Vol Buzz</th>
            <th class="hide-sm">VWAP</th>
            <th class="hide-sm">High / Low</th>
            <th>Avg Cost</th>
            <th>Shares</th>
            <th>Unrealized P&L</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="wl-body">
          <tr class="empty-row"><td colspan="10">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <p class="refresh-note" id="refresh-note"></p>
  </main>

  <script>
    fetch('/api/me').then(r => { if (!r.ok) window.location.href = '/' })
    async function logout() {
      await fetch('/api/logout', { method: 'POST' })
      window.location.href = '/'
    }

    const stockCache = {}
    let watchlist = []

    function fmt(n, d = 2) { return (n ?? 0).toFixed(d) }
    function buzzClass(b) { return b >= 3 ? 'buzz-hot' : b >= 1.5 ? 'buzz-mid' : 'buzz-low' }

    function buzzBar(b) {
      const pct = Math.min(b / 4 * 100, 100)
      const color = b >= 3 ? '#f5a623' : b >= 1.5 ? '#d4a800' : '#333'
      return `<div class="vol-bar"><div class="vol-fill" style="width:${pct}%;background:${color}"></div></div>`
    }

    function renderPnl(item, stock) {
      if (!item.avg_cost || !item.shares || !stock) return '<span class="muted">—</span>'
      const pnl = (stock.price - item.avg_cost) * item.shares
      const pct = (stock.price - item.avg_cost) / item.avg_cost * 100
      const cls = pnl >= 0 ? 'green' : 'red'
      return `<span class="${cls} num">${pnl >= 0 ? '+' : '-'}$${fmt(Math.abs(pnl))}</span>
              <span class="muted" style="font-size:11px"> (${pct >= 0 ? '+' : ''}${fmt(pct)}%)</span>`
    }

    function renderRow(item) {
      const s = stockCache[item.ticker]
      const priceStr = s ? `$${fmt(s.price)}` : '<span class="muted">—</span>'
      const changeStr = s
        ? `<span class="${s.changePct >= 0 ? 'green' : 'red'} num">${s.changePct >= 0 ? '+' : ''}${fmt(s.changePct)}%</span>`
        : '<span class="muted">—</span>'
      const buzzStr = s
        ? `<span class="buzz-pill ${buzzClass(s.volumeBuzz)}">${fmt(s.volumeBuzz, 1)}x</span>${buzzBar(s.volumeBuzz)}`
        : '<span class="muted">—</span>'
      const vwapStr = s ? `<span class="num muted">$${fmt(s.vwap)}</span>` : '—'
      const hlStr = s ? `<span class="green num">$${fmt(s.high)}</span> / <span class="red num">$${fmt(s.low)}</span>` : '—'
      const costStr = item.avg_cost ? `$${fmt(item.avg_cost)}` : '<span class="muted">—</span>'
      const sharesStr = item.shares > 0 ? `<span class="num">${item.shares}</span>` : '<span class="muted">—</span>'

      return `<tr data-id="${item.id}">
        <td>
          <div class="ticker-cell">${item.ticker}</div>
          <div class="name-cell">${s ? s.name : ''}</div>
        </td>
        <td class="price-cell">${priceStr}</td>
        <td>${changeStr}</td>
        <td>${buzzStr}</td>
        <td class="hide-sm">${vwapStr}</td>
        <td class="hide-sm">${hlStr}</td>
        <td>${costStr}</td>
        <td>${sharesStr}</td>
        <td>${renderPnl(item, s)}</td>
        <td>
          <button class="del-btn" onclick="removeTicker('${item.id}')" title="Remove">×</button>
        </td>
      </tr>`
    }

    function renderTable() {
      const tbody = document.getElementById('wl-body')
      if (watchlist.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="10">No tickers yet. Add one above.</td></tr>'
        return
      }
      tbody.innerHTML = watchlist.map(renderRow).join('')
    }

    async function fetchStocks() {
      await Promise.allSettled(watchlist.map(async item => {
        const r = await fetch(`/api/stocks/${item.ticker}`)
        if (r.ok) stockCache[item.ticker] = await r.json()
      }))
      const now = new Date()
      document.getElementById('refresh-note').textContent =
        `Last updated ${now.toLocaleTimeString()} · auto-refreshes every 60s`
      renderTable()
    }

    async function loadWatchlist() {
      const r = await fetch('/api/watchlist')
      if (!r.ok) return
      watchlist = await r.json()
      renderTable()
      await fetchStocks()
    }

    async function addTicker() {
      const ticker = document.getElementById('new-ticker').value.trim().toUpperCase()
      if (!ticker) return
      const avg_cost = parseFloat(document.getElementById('new-cost').value) || null
      const shares = parseFloat(document.getElementById('new-shares').value) || 0
      const notes = document.getElementById('new-notes').value.trim() || null

      const r = await fetch('/api/watchlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker, avg_cost, shares, notes }),
      })

      if (r.ok) {
        document.getElementById('new-ticker').value = ''
        document.getElementById('new-cost').value = ''
        document.getElementById('new-shares').value = ''
        document.getElementById('new-notes').value = ''
        await loadWatchlist()
      }
    }

    async function removeTicker(id) {
      await fetch(`/api/watchlist/${id}`, { method: 'DELETE' })
      watchlist = watchlist.filter(w => w.id !== id)
      renderTable()
    }

    // Enter key to add
    document.getElementById('new-ticker').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTicker()
    })

    loadWatchlist()
    setInterval(fetchStocks, 60000)
  </script>
</body>
</html>
