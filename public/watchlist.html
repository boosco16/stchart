<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwingTrader — Watchlist</title>
  <link rel="stylesheet" href="/shared.css" />
  <style>
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    .calc { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; position: sticky; top: 72px; }
    .calc h2 { font-size: 13px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .calc input[type="text"], .calc input[type="number"] { width: 100%; margin-bottom: 10px; }
    .calc-result { margin-top: 16px; padding-top: 16px; border-top: 1px solid #1a1a1a; }
    .result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; font-size: 13px; }
    .result-row:not(:last-child) { border-bottom: 1px solid #141414; }
    .result-key { color: #444; }
    .result-val { font-variant-numeric: tabular-nums; color: #ccc; }
    .position-size { font-size: 32px; font-weight: 700; color: #00c97a; letter-spacing: -1px; font-variant-numeric: tabular-nums; margin: 12px 0 4px; }
    .position-label { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
    .refresh-bar { margin-top: 14px; display: flex; align-items: center; gap: 8px; }
    .refresh-track { flex: 1; height: 2px; background: #1a1a1a; border-radius: 1px; }
    .refresh-fill { height: 2px; background: #00c97a; border-radius: 1px; transition: width 1s linear; }
    .refresh-label { font-size: 11px; color: #333; white-space: nowrap; }
    .error-msg { font-size: 12px; color: #ff5555; margin-top: 8px; }

    .wl-top { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 16px; }
    .wl-top input.ticker-input { width: 80px; text-transform: uppercase; font-weight: 600; }
    .wl-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 14px; text-align: left; border-bottom: 1px solid #1a1a1a; white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid #141414; font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #131313; }
    .ticker-name { font-size: 14px; font-weight: 600; color: #fff; }
    .co-name { font-size: 11px; color: #333; margin-top: 1px; }
    .buzz { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 5px; }
    .buzz-hot { background: #2d1200; color: #f5a623; }
    .buzz-mid { background: #1e1a00; color: #d4a800; }
    .buzz-low { background: #161616; color: #444; }
    .del { background: none; border: none; color: #2a2a2a; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
    .del:hover { color: #ff5555; }
    .empty { color: #2a2a2a; text-align: center; padding: 40px; }
    .num { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/dashboard">📈 SwingTrader</a>
    <a class="nav-link" href="/dashboard">Scanner</a>
    <a class="nav-link active" href="/watchlist">Watchlist</a>
    <div class="nav-right"><button class="logout-btn" onclick="logout()">Sign out</button></div>
  </nav>

  <main>
    <div class="layout">

      <!-- CALCULATOR -->
      <div class="calc">
        <h2>Position Size</h2>

        <label>Account Value ($)</label>
        <input type="number" id="account" placeholder="100000" oninput="saveAccount()" />

        <label>Ticker</label>
        <input type="text" id="calc-ticker" placeholder="AAPL" maxlength="6"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter') startCalc()" />

        <button class="btn btn-green" style="width:100%;margin-top:4px" onclick="startCalc()">Calculate</button>

        <div class="calc-result" id="calc-result" style="display:none">
          <div class="position-label">Position Size</div>
          <div class="position-size" id="pos-size">—</div>
          <div style="font-size:12px;color:#444;margin-bottom:12px">shares</div>
          <div class="result-row"><span class="result-key">Ticker</span><span class="result-val" id="res-ticker">—</span></div>
          <div class="result-row"><span class="result-key">Current price</span><span class="result-val" id="res-price">—</span></div>
          <div class="result-row"><span class="result-key">Day low</span><span class="result-val" id="res-low">—</span></div>
          <div class="result-row"><span class="result-key">Risk / share</span><span class="result-val" id="res-risk">—</span></div>
          <div class="result-row"><span class="result-key">1% of account</span><span class="result-val" id="res-dollar-risk">—</span></div>
          <div class="refresh-bar">
            <div class="refresh-track"><div class="refresh-fill" id="refresh-fill" style="width:100%"></div></div>
            <span class="refresh-label" id="refresh-label">30s</span>
          </div>
        </div>
        <p class="error-msg" id="calc-error"></p>
      </div>

      <!-- WATCHLIST -->
      <div>
        <div class="wl-top">
          <div>
            <label>Ticker</label>
            <input class="ticker-input" id="new-ticker" type="text" placeholder="AAPL" maxlength="6"
              onkeydown="if(event.key==='Enter') addTicker()" />
          </div>
          <button class="btn btn-green" onclick="addTicker()">+ Add</button>
        </div>

        <div class="wl-card">
          <table>
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Price</th>
                <th>Change</th>
                <th>Vol Buzz</th>
                <th>High</th>
                <th>Low</th>
                <th>Volume</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="wl-body"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
        <p style="font-size:11px;color:#2a2a2a;text-align:right;margin-top:8px" id="wl-updated"></p>
      </div>

    </div>
  </main>

  <script>
    fetch('/api/me').then(r => { if (!r.ok) window.location.href = '/' })
    async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/' }

    const accountInput = document.getElementById('account')
    accountInput.value = localStorage.getItem('st_account') || ''
    function saveAccount() { localStorage.setItem('st_account', accountInput.value) }

    // ── Fetch stock data directly from Yahoo (browser-side, no server needed) ──
    async function fetchYahoo(ticker) {
      try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`
        const r = await fetch(url)
        if (!r.ok) return null
        const data = await r.json()
        const result = data?.chart?.result?.[0]
        if (!result) return null
        const meta = result.meta
        const quote = result.indicators?.quote?.[0]
        const price = meta.regularMarketPrice ?? 0
        const prevClose = meta.chartPreviousClose ?? meta.previousClose ?? 0
        const open = quote?.open?.[0] ?? 0
        const high = quote?.high?.[0] ?? 0
        const low = quote?.low?.[0] ?? 0
        const volume = quote?.volume?.[0] ?? 0
        const avgVolume = meta.averageDailyVolume10Day ?? meta.averageDailyVolume3Month ?? 1
        const change = price - prevClose
        const changePct = prevClose ? (change / prevClose) * 100 : 0
        const volumeBuzz = parseFloat((volume / avgVolume).toFixed(2))
        return {
          ticker,
          name: meta.longName || meta.shortName || ticker,
          price, open, high, low, volume,
          prevClose, change, changePct, volumeBuzz
        }
      } catch {
        return null
      }
    }

    // ── Calculator ──
    let calcTicker = ''
    let calcTimer = null
    let countdown = 30
    let countdownTimer = null

    function startCalc() {
      const ticker = document.getElementById('calc-ticker').value.trim().toUpperCase()
      if (!ticker) return
      calcTicker = ticker
      clearInterval(calcTimer)
      clearInterval(countdownTimer)
      fetchCalc()
      calcTimer = setInterval(fetchCalc, 30000)
    }

    async function fetchCalc() {
      const account = parseFloat(document.getElementById('account').value)
      document.getElementById('calc-error').textContent = ''

      if (!account) {
        document.getElementById('calc-error').textContent = 'Enter your account value first'
        return
      }

      const s = await fetchYahoo(calcTicker)
      if (!s) {
        document.getElementById('calc-error').textContent = `Could not find ticker: ${calcTicker}`
        return
      }

      const price = s.price
      const low = s.low
      const riskPerShare = price - low
      const dollarRisk = account * 0.01
      const positionSize = riskPerShare > 0 ? Math.floor(dollarRisk / riskPerShare) : 0

      document.getElementById('calc-result').style.display = 'block'
      document.getElementById('res-ticker').textContent = calcTicker
      document.getElementById('pos-size').textContent = positionSize.toLocaleString()
      document.getElementById('res-price').textContent = '$' + price.toFixed(2)
      document.getElementById('res-low').textContent = '$' + low.toFixed(2)
      document.getElementById('res-risk').textContent = riskPerShare > 0 ? '$' + riskPerShare.toFixed(2) : 'N/A (price = low)'
      document.getElementById('res-dollar-risk').textContent = '$' + dollarRisk.toFixed(2)

      countdown = 30
      clearInterval(countdownTimer)
      countdownTimer = setInterval(() => {
        countdown--
        const pct = (countdown / 30) * 100
        document.getElementById('refresh-fill').style.width = pct + '%'
        document.getElementById('refresh-label').textContent = countdown + 's'
        if (countdown <= 0) clearInterval(countdownTimer)
      }, 1000)
    }

    // ── Watchlist ──
    const stockCache = {}
    let watchlist = []

    function buzzClass(b) { return b >= 3 ? 'buzz buzz-hot' : b >= 1.5 ? 'buzz buzz-mid' : 'buzz buzz-low' }
    function fmt(n, d=2) { return (n ?? 0).toFixed(d) }

    function renderTable() {
      const tbody = document.getElementById('wl-body')
      if (!watchlist.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">No tickers yet.</td></tr>'
        return
      }
      tbody.innerHTML = watchlist.map(item => {
        const s = stockCache[item.ticker]
        return `<tr>
          <td><div class="ticker-name">${item.ticker}</div><div class="co-name">${s?.name || ''}</div></td>
          <td class="num">${s ? '$' + fmt(s.price) : '<span class="muted">—</span>'}</td>
          <td>${s ? `<span class="${s.changePct >= 0 ? 'green' : 'red'} num">${s.changePct >= 0 ? '+' : ''}${fmt(s.changePct)}%</span>` : '—'}</td>
          <td>${s ? `<span class="${buzzClass(s.volumeBuzz)}">${fmt(s.volumeBuzz, 1)}x</span>` : '—'}</td>
          <td class="num muted">${s?.high ? '$' + fmt(s.high) : '—'}</td>
          <td class="num muted">${s?.low ? '$' + fmt(s.low) : '—'}</td>
          <td class="num muted">${s?.volume ? s.volume.toLocaleString() : '—'}</td>
          <td><button class="del" onclick="remove('${item.id}')">×</button></td>
        </tr>`
      }).join('')
    }

    async function loadWatchlist() {
      const r = await fetch('/api/watchlist')
      if (!r.ok) return
      watchlist = await r.json()
      renderTable()
      await Promise.allSettled(watchlist.map(async item => {
        const s = await fetchYahoo(item.ticker)
        if (s) stockCache[item.ticker] = s
      }))
      renderTable()
      document.getElementById('wl-updated').textContent = 'Updated ' + new Date().toLocaleTimeString()
    }

    async function addTicker() {
      const ticker = document.getElementById('new-ticker').value.trim().toUpperCase()
      if (!ticker) return
      const r = await fetch('/api/watchlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker })
      })
      if (r.ok) {
        document.getElementById('new-ticker').value = ''
        loadWatchlist()
      }
    }

    async function remove(id) {
      await fetch(`/api/watchlist/${id}`, { method: 'DELETE' })
      watchlist = watchlist.filter(w => w.id !== id)
      renderTable()
    }

    loadWatchlist()
    setInterval(loadWatchlist, 60000)
  </script>
</body>
</html>
